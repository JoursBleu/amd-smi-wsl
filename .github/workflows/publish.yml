name: Publish to PyPI

# Publishes the package to PyPI via OIDC "Trusted Publishing" — NO API token is
# stored in the repo. One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   PyPI project:  amd-smi-wsl
#   Owner:         JoursBleu
#   Repository:    amd-smi-wsl
#   Workflow:      publish.yml
#   Environment:   pypi
# After that, publishing a GitHub Release (or running this workflow manually)
# builds the wheel + sdist and uploads them automatically.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/amd-smi-wsl/
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
